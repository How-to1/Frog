<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Falling Stars!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(to top, #001f3f, #0074D9);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #87CEEB;
      border: 3px solid #fff;
      border-radius: 10px;
    }

    #scoreBoard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px #000;
    }

    #instruction {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="scoreBoard">Score: 0</div>
  <div id="instruction">Use ⬅️ and ➡️ to move the frog and catch the stars!</div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const frogImg = new Image();
    frogImg.src = 'https://i.postimg.cc/kXdzCrvn/frog.png'; // Replace with your frog image URL

    const starImg = new Image();
    starImg.src = 'https://i.postimg.cc/3x3QzSGq/star.png'; // Replace with your star image URL

    const frog = {
      x: canvas.width / 2 - 50,
      y: canvas.height - 100,
      width: 100,
      height: 80,
      speed: 10,
      jumping: false,
      jumpHeight: 40,
      currentJumpHeight: 0
    };

    let stars = [];
    let score = 0;
    let keys = {};

    // Handle keyboard input
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function createStar() {
      const size = 40;
      const star = {
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: 3 + Math.random() * 2
      };
      stars.push(star);
    }

    function moveFrog() {
      if (keys['ArrowLeft'] && frog.x > 0) {
        frog.x -= frog.speed;
      }
      if (keys['ArrowRight'] && frog.x < canvas.width - frog.width) {
        frog.x += frog.speed;
      }
    }

    function frogJump() {
      if (!frog.jumping) {
        frog.jumping = true;
        frog.currentJumpHeight = frog.jumpHeight;
      }
    }

    function updateFrogJump() {
      if (frog.jumping) {
        frog.y -= 5;
        frog.currentJumpHeight -= 5;
        if (frog.currentJumpHeight <= 0) {
          frog.jumping = false;
        }
      } else if (frog.y < canvas.height - 100) {
        frog.y += 5;
      }
    }

    function detectCollision(frog, star) {
      const mouthX = frog.x + frog.width / 2 - 15;
      const mouthY = frog.y + frog.height / 2 - 15;

      return (
        mouthX < star.x + star.width &&
        mouthX + 30 > star.x &&
        mouthY < star.y + star.height &&
        mouthY + 30 > star.y
      );
    }

    function updateStars() {
      stars.forEach((star, index) => {
        star.y += star.speed;

        if (detectCollision(frog, star)) {
          // Star goes inside mouth
          stars.splice(index, 1);
          score++;
          document.getElementById('scoreBoard').textContent = 'Score: ' + score;
          frogJump(); // make frog jump when catching a star
        } else if (star.y > canvas.height) {
          stars.splice(index, 1); // remove star if it goes off-screen
        }
      });
    }

    function drawFrog() {
      ctx.drawImage(frogImg, frog.x, frog.y, frog.width, frog.height);
    }

    function drawStars() {
      stars.forEach((star) => {
        ctx.drawImage(starImg, star.x, star.y, star.width, star.height);
      });
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      moveFrog();
      updateFrogJump();
      updateStars();

      drawFrog();
      drawStars();

      requestAnimationFrame(gameLoop);
    }

    // Start game
    setInterval(createStar, 1000); // every second drop a new star
    gameLoop();
  </script>
</body>
</html>
